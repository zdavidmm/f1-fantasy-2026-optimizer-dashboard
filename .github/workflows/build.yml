name: build-and-deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache FastF1 and provider cache
        uses: actions/cache@v4
        with:
          path: |
            fastf1_cache
            provider_cache
            public/data/cache
          key: ${{ runner.os }}-f1-cache-${{ hashFiles('config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-f1-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run optimizer pipeline
        env:
          OPENF1_API_KEY: ${{ secrets.OPENF1_API_KEY }}
        run: python -m src.cli run --mode all

      - name: Build site
        run: python -m src.cli build-site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
